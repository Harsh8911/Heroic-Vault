<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>3D Gallery</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <style>
      .fallback-container {
        width: 960px;
        height: 600px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: white;
        text-align: center;
        font-family: Arial, sans-serif;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      }
      .fallback-container h1 {
        font-size: 28px;
        margin: 0 0 16px 0;
      }
      .fallback-container p {
        font-size: 16px;
        margin: 0 0 24px 0;
        max-width: 600px;
        line-height: 1.6;
      }
      .fallback-container a {
        display: inline-block;
        padding: 12px 28px;
        background: white;
        color: #667eea;
        text-decoration: none;
        border-radius: 6px;
        font-weight: bold;
        transition: transform 0.2s ease;
        margin: 8px;
      }
      .fallback-container a:hover {
        transform: scale(1.05);
        box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      }
    </style>
  </head>
  <body>
    <div id="unity-container" class="unity-desktop">
      <div class="fallback-container">
        <h1>🏛️ 3D Museum Gallery</h1>
        <p>The interactive museum is upgrading! View our collection of 3D models and historical artifacts using our modern gallery viewer.</p>
        <div>
          <a href="/">← Back to Home</a>
          <a href="/studios.html">View 3D Models →</a>
        </div>
      </div>
      <div id="unity-footer">
        <div id="unity-webgl-logo"></div>
        <div id="unity-fullscreen-button"></div>
        <div id="unity-build-title">3D Gallery</div>
      </div>
  </body>
</html>
